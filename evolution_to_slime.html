<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Evolution → Slime</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Space+Mono&family=Scheherazade+New:wght@700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #000; width: 100vw; height: 100vh; overflow: hidden; }

  #evo-canvas  { position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:1; }
  #slime-canvas{ position: fixed; top:0; left:0; width:100vw; height:100vh; z-index:2; pointer-events:none; }

  #farsi-bg {
    position: fixed; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none; line-height: 0.85;
  }
  .fw {
    font-family: 'Scheherazade New', serif;
    font-weight: 700; direction: rtl;
    color: rgba(255,255,255,0.09);
    user-select: none; white-space: nowrap;
    font-size: 21vw;
  }

  #eq-panel {
    position: fixed; top: 50%; left: 28px;
    transform: translateY(-50%);
    pointer-events: none; z-index: 10;
    display: flex; flex-direction: column; gap: 10px;
    transition: opacity 2s ease;
  }
  #eq-panel::before {
    content: ''; position: absolute;
    left: -14px; top: 0; bottom: 0;
    width: 1px; background: rgba(255,255,255,0.25);
  }
  .eq-row { display: flex; align-items: baseline; gap: 0; line-height: 1; }
  .var  { font-family:'IM Fell English',serif; font-style:italic; font-size:1.4rem;  color:rgba(255,255,255,0.95); min-width:14px; }
  .eq   { font-family:'IM Fell English',serif; font-size:1.35rem; color:rgba(255,255,255,0.45); padding:0 8px; }
  .op   { font-family:'IM Fell English',serif; font-size:1.25rem; color:rgba(255,255,255,0.55); }
  .num  { font-family:'Space Mono',monospace;  font-size:0.95rem; color:rgba(255,255,255,0.97); font-style:normal; min-width:32px; display:inline-block; }
  .frac { display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; margin:0 3px; }
  .frac-top { font-family:'IM Fell English',serif; font-size:0.88rem; color:rgba(255,255,255,0.55); border-bottom:1px solid rgba(255,255,255,0.4); padding:0 3px 1px; line-height:1.1; }
  .frac-top .num { font-size:0.78rem; }
  .frac-bot { font-family:'IM Fell English',serif; font-size:0.88rem; color:rgba(255,255,255,0.55); padding:1px 3px 0; line-height:1.1; }
  .frac-bot .num { font-size:0.78rem; }
  sup.num { font-size:0.72rem; vertical-align:super; min-width:auto; }
  .paren { color:rgba(255,255,255,0.3); font-family:'IM Fell English',serif; font-size:1.35rem; }
</style>
</head>
<body>

<div id="farsi-bg"><div class="fw">دگردیسی</div></div>
<div id="evo-canvas"></div>
<div id="slime-canvas"></div>

<div id="eq-panel">
  <div class="eq-row">
    <span class="var">k</span><span class="eq">=</span>
    <span class="num" id="v-ka">2.0</span>
    <span class="op"> · cos</span><span class="paren">(</span>
    <span class="frac"><span class="frac-top"><span class="op">x</span></span><span class="frac-bot"><span class="num" id="v-kx">22</span></span></span>
    <span class="paren">)</span>
    <span class="op"> · cos</span><span class="paren">(</span>
    <span class="frac"><span class="frac-top"><span class="op">y</span></span><span class="frac-bot"><span class="num" id="v-ky">70</span></span></span>
    <span class="paren">)</span>
  </div>
  <div class="eq-row">
    <span class="var">e</span><span class="eq">=</span>
    <span class="frac"><span class="frac-top"><span class="op">y</span></span><span class="frac-bot"><span class="op">8</span></span></span>
    <span class="op"> − </span><span class="num" id="v-eo">3</span>
  </div>
  <div class="eq-row">
    <span class="var">d</span><span class="eq">=</span>
    <span class="frac">
      <span class="frac-top"><span class="op">‖(k,e)‖</span><sup class="num" id="v-exp">2</sup></span>
      <span class="frac-bot"><span class="num" id="v-dd">26</span></span>
    </span>
    <span class="op"> + 4</span>
  </div>
  <div class="eq-row">
    <span class="var">q</span><span class="eq">=</span>
    <span class="num" id="v-qb">95</span>
    <span class="op"> − </span><span class="num" id="v-qt">1</span>
    <span class="op"> · sin</span><span class="paren">(</span><span class="op">θ · e</span><span class="paren">)</span>
  </div>
  <div class="eq-row">
    <span class="var">w</span><span class="eq">=</span>
    <span class="op">k · </span><span class="paren">(</span><span class="op">3 + </span>
    <span class="frac"><span class="frac-top"><span class="num" id="v-ws">1.5</span></span><span class="frac-bot"><span class="op">d</span></span></span>
    <span class="op"> · sin</span><span class="paren">(</span><span class="op">d² − t·</span><span class="num" id="v-tr">0.5</span><span class="paren">))</span>
  </div>
  <div class="eq-row">
    <span class="paren">(</span><span class="var" style="font-style:normal;font-size:0.85rem;">x,y</span><span class="paren">)</span>
    <span class="eq">=</span>
    <span class="paren">(</span><span class="op">q+w</span><span class="paren">)</span><span class="op">sin c , </span>
    <span class="paren">(</span><span class="op">q+d·</span><span class="num" id="v-ds">3.5</span><span class="paren">)</span><span class="op">cos c</span>
  </div>
  <div class="eq-row">
    <span class="var">c</span><span class="eq">=</span>
    <span class="frac"><span class="frac-top"><span class="op">d</span></span><span class="frac-bot"><span class="op">2</span></span></span>
    <span class="op"> + </span>
    <span class="frac"><span class="frac-top"><span class="op">e</span></span><span class="frac-bot"><span class="op">99</span></span></span>
    <span class="op"> − </span>
    <span class="frac"><span class="frac-top"><span class="op">t</span></span><span class="frac-bot"><span class="num" id="v-ts">55</span></span></span>
  </div>
</div>

<script>
// ── Shared state ─────────────────────────────────────────────────
// After CYCLES_BEFORE_SLIME full cycles the slime fades in over FADE_SEC seconds.
const SLIME_AFTER_SEC = 120; // 2 minutes
const FADE_SEC = 12;

// slimeProgress: 0 = pure evolution, 1 = pure slime
window.slimeProgress = 0;
window.slimeStarted  = false;

// ── Animal DNA ───────────────────────────────────────────────────
const animals = [
  { kx:22, ky:70, ka:2,  eo:3,  dd:26, qb:95,  ds:3.5, ws:1.5, tr:0.5, ts:55,  qt:1,  exp:2,   spd:0.06 },
  { kx:4,  ky:4,  ka:14, eo:0,  dd:20, qb:85,  ds:6,   ws:0.5, tr:4,   ts:100, qt:0,  exp:2.5, spd:0.04 },
  { kx:3,  ky:7,  ka:11, eo:18, dd:88, qb:65,  ds:18,  ws:9,   tr:2,   ts:11,  qt:3,  exp:2,   spd:0.12 },
  { kx:36, ky:18, ka:3,  eo:2,  dd:16, qb:105, ds:4,   ws:0.6, tr:0.3, ts:80,  qt:14, exp:1.5, spd:0.03 },
  { kx:5,  ky:5,  ka:11, eo:12, dd:52, qb:58,  ds:5.5, ws:0.3, tr:4,   ts:160, qt:15, exp:3,   spd:0.05 },
  { kx:28, ky:50, ka:4,  eo:6,  dd:20, qb:110, ds:1.8, ws:2,   tr:0.4, ts:50,  qt:2,  exp:2,   spd:0.05 },
  { kx:6,  ky:9,  ka:8,  eo:14, dd:40, qb:68,  ds:9,   ws:7,   tr:2.5, ts:14,  qt:7,  exp:2,   spd:0.10 },
  { kx:5,  ky:7,  ka:10, eo:8,  dd:70, qb:55,  ds:14,  ws:0.1, tr:5,   ts:300, qt:14, exp:3.5, spd:0.02 },
  { kx:9,  ky:15, ka:7,  eo:11, dd:58, qb:52,  ds:8,   ws:6,   tr:4,   ts:11,  qt:5,  exp:2,   spd:0.11 },
  { kx:18, ky:30, ka:5,  eo:0,  dd:13, qb:120, ds:10,  ws:3,   tr:0.5, ts:40,  qt:9,  exp:1.8, spd:0.04 },
];

const HOLD_SEC  = 6.0;
const MORPH_SEC = 4.0;

function ease(t) { return t < 0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
function lerp(a,b,t) { return a+(b-a)*t; }
function lerpDNA(A,B,t) { const r={}; for(const k of Object.keys(A)) r[k]=lerp(A[k],B[k],t); return r; }
function f(n,dec=1) { return parseFloat(n.toFixed(dec)); }
function set(id,val,dec=1) { const el=document.getElementById(id); if(el) el.textContent=f(val,dec); }
function updateEq(dna) {
  set('v-ka',dna.ka); set('v-kx',dna.kx); set('v-ky',dna.ky);
  set('v-eo',dna.eo); set('v-dd',dna.dd); set('v-exp',dna.exp);
  set('v-qb',dna.qb); set('v-qt',dna.qt); set('v-ws',dna.ws);
  set('v-tr',dna.tr); set('v-ds',dna.ds); set('v-ts',dna.ts);
}

// ── Evolution sketch ─────────────────────────────────────────────
new p5(function(p) {
  let tAnim=0, curSpd=0.06, clock=0, phase='hold', idx=0, elapsed=0;

  p.setup = function() {
    p.createCanvas(window.innerWidth, window.innerHeight).parent('evo-canvas');
    p.strokeWeight(1);
    updateEq(animals[0]);
  };
  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };

  p.draw = function() {
    const sp = window.slimeProgress;

    // Fade out equation panel CSS
    document.getElementById('eq-panel').style.opacity = 1 - sp;

    // Evolution fades out as slime fades in
    // We draw with reduced alpha
    const evoAlpha = Math.max(0, 1 - sp);
    if (evoAlpha <= 0) { p.background(0); return; }

    p.background(0);
    const dt = p.deltaTime / 1000;
    clock += dt;
    elapsed += dt;
    if (elapsed >= SLIME_AFTER_SEC) window.slimeStarted = true;

    const next = (idx+1) % animals.length;
    let dna;

    if (phase === 'hold') {
      dna = animals[idx];
      if (clock >= HOLD_SEC) { clock=0; phase='morph'; }
    } else {
      const raw = Math.min(clock/MORPH_SEC, 1);
      dna = lerpDNA(animals[idx], animals[next], ease(raw));
      if (raw >= 1) {
        idx = next; clock=0; phase='hold';
        // slime trigger is time-based, handled below
      }
    }

    curSpd = lerp(curSpd, dna.spd, 0.018);
    tAnim += curSpd;

    const spread   = dna.qb * Math.sqrt(dna.ds);
    const refSpread = 177;
    const areaScale = (spread/refSpread)*(spread/refSpread);
    const pts   = Math.round(Math.min(160000, Math.max(24000, 50000*areaScale)));
    const alpha = Math.round(Math.min(130, Math.max(70, 90*(refSpread/spread))) * evoAlpha);

    p.stroke(255, alpha);
    const cx=p.width/2, cy=p.height/2;

    for (let i=0; i<pts; i++) {
      const x=i%80, y=i/80;
      const k  = dna.ka*p.cos(x/dna.kx)*p.cos(y/dna.ky);
      const e  = y/8 - dna.eo;
      const m  = p.mag(k,e);
      const d  = Math.pow(m,dna.exp)/dna.dd+4;
      const at = p.atan2(k,e);
      const q  = dna.qb - dna.qt*p.sin(at*e);
      const wv = k*(3+dna.ws/d*p.sin(d*d-tAnim*dna.tr));
      const c  = d/2+e/99-tAnim/dna.ts;
      p.point((q+wv)*p.sin(c)*1.35+cx, (q+d*dna.ds)*p.cos(c)+cy);
    }

    if (p.frameCount%4===0) updateEq(dna);
  };
});

// ── Slime sketch ─────────────────────────────────────────────────
new p5(function(p) {
  const N=2000, SPEED=1.0, SA=30, SD=9, RA=22;
  let agents=[], fadeClock=0;

  p.setup = function() {
    let cnv = p.createCanvas(window.innerWidth, window.innerHeight);
    cnv.parent('slime-canvas');
    p.angleMode(p.DEGREES);
    p.pixelDensity(1);
    p.background(0,0,0,0);

    for (let i=0; i<N; i++) {
      agents.push({
        x: p.width/2  + p.random(-100,100),
        y: p.height/2 + p.random(-100,100),
        a: p.random(360)
      });
    }
  };
  p.windowResized = function() { p.resizeCanvas(window.innerWidth, window.innerHeight); };

  function sense(ag, offset) {
    const a  = ag.a + offset;
    const sx = Math.round(ag.x + SD*p.cos(a));
    const sy = Math.round(ag.y + SD*p.sin(a));
    if (sx<0||sx>=p.width||sy<0||sy>=p.height) return 0;
    return p.pixels[(sy*p.width+sx)*4];
  }

  p.draw = function() {
    if (!window.slimeStarted && window.slimeProgress <= 0) {
      // Not yet — keep canvas clear
      p.clear();
      return;
    }

    // Advance fade
    if (window.slimeStarted && window.slimeProgress < 1) {
      fadeClock += p.deltaTime/1000;
      window.slimeProgress = Math.min(1, fadeClock/FADE_SEC);
    }

    const sp = window.slimeProgress;

    // Faint decay — trails persist
    p.fill(0, 10);
    p.noStroke();
    p.rect(0,0,p.width,p.height);

    p.loadPixels();
    for (let i=0; i<agents.length; i++) {
      const ag = agents[i];
      const F=sense(ag,0), L=sense(ag,-SA), R=sense(ag,SA);
      if      (F>L && F>R)  { /* straight */ }
      else if (F<L && F<R)  { ag.a += p.random([-RA,RA]); }
      else if (L>R)         { ag.a -= RA; }
      else if (R>L)         { ag.a += RA; }

      ag.x += SPEED*p.cos(ag.a);
      ag.y += SPEED*p.sin(ag.a);
      if (ag.x<0||ag.x>=p.width)  { ag.a=180-ag.a; ag.x=p.constrain(ag.x,0,p.width-1); }
      if (ag.y<0||ag.y>=p.height) { ag.a=-ag.a;     ag.y=p.constrain(ag.y,0,p.height-1); }

      const ix=Math.floor(ag.x), iy=Math.floor(ag.y);
      const idx=(iy*p.width+ix)*4;
      const bright = Math.round(220*sp);
      p.pixels[idx]=p.pixels[idx+1]=p.pixels[idx+2]=bright;
      p.pixels[idx+3]=Math.round(200*sp);
    }
    p.updatePixels();
  };
});
</script>
</body>
</html>
